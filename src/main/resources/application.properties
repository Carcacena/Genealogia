ERVER CONFIGURATION
# ===================================================================
# Railway automatically assigns a port at runtime via the PORT variable
server.port=${PORT:8080}

# ===================================================================
# MYSQL DATASOURCE CONFIGURATION
# ===================================================================
# Dynamically reads variables generated by Railway's MySQL service
#spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQLUSER}:${MYSQLPASSWORD}@${RAILWAY_PRIVATE_DOMAIN}:${MYSQL_PRIVATE_PORT}/${MYSQLDATABASE}

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CUSTOM JWT CONFIGURATION
# ===================================================================
# These variables should be set manually in the Railway Dashboard variables tab
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

server.port=${PORT:8080}
server.address=0.0.0.0




