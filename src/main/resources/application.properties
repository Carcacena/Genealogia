# Database connection configuration
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Explicitly declare the dialect as a safety fallback
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Desativa Flyway para evitar conflito com ddl-auto=update

#spring.flyway.clean-on-validation-error=true
spring.flyway.validate-on-migrate=false

# Configurações de Rede obrigatórias para o Railway
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework
# Segurança JWT Protegida (Lendo do painel do Railway que você configurou)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
